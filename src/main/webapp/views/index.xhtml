<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:pt="jakarta.faces.passthrough"
      lang="ja">
<h:head>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>トップ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&amp;display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="#{request.contextPath}/css/dads.css" />
</h:head>
<h:body>
<div class="page-container">

    <h1 class="dads-heading" data-size="28" data-rule="4">JSF サンプル</h1>

    <h:form styleClass="form-actions">
        <!--
            dads:button は action に method-signature を要求するため、
            リテラルナビゲーション結果 "register" には h:commandButton を直接使う
        -->
        <h:commandButton value="ユーザー登録フォームへ"
                         action="register"
                         styleClass="dads-button"
                         pt:data-type="solid-fill"
                         pt:data-size="lg" />
    </h:form>

    <p><h:link value="登録済みユーザー一覧" outcome="list" /></p>

</div>
</h:body>
</html>
