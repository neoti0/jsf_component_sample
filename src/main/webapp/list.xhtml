<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      lang="ja">
<h:head>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>登録済みユーザー一覧</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&amp;display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="#{request.contextPath}/css/dads.css" />
</h:head>
<h:body>
<div class="page-container--wide">

    <h1 class="dads-heading" data-size="28" data-rule="4">登録済みユーザー一覧</h1>

    <h:panelGroup rendered="#{empty userBean.users}">
        <p>登録済みユーザーはいません。</p>
    </h:panelGroup>

    <h:panelGroup rendered="#{not empty userBean.users}">
        <div class="dads-table">
            <table class="dads-table__table">
                <thead>
                    <tr>
                        <th class="dads-table__col-header" scope="col">#</th>
                        <th class="dads-table__col-header" scope="col">名前</th>
                        <th class="dads-table__col-header" scope="col">メールアドレス</th>
                        <th class="dads-table__col-header" scope="col">電話番号</th>
                        <th class="dads-table__col-header" scope="col">郵便番号</th>
                        <th class="dads-table__col-header" scope="col">住所</th>
                    </tr>
                </thead>
                <tbody>
                    <ui:repeat value="#{userBean.users}" var="user" varStatus="status">
                        <tr>
                            <td>#{status.index + 1}</td>
                            <td>#{user.name}</td>
                            <td>#{user.email}</td>
                            <td>#{user.phoneNumber}</td>
                            <td>#{user.postalCode}</td>
                            <td>
                                #{user.prefecture}#{user.city}#{user.streetAddress}
                                <h:panelGroup rendered="#{not empty user.buildingName}">
                                    <br />#{user.buildingName}
                                </h:panelGroup>
                            </td>
                        </tr>
                    </ui:repeat>
                </tbody>
            </table>
        </div>
    </h:panelGroup>

    <p><h:link value="登録フォームへ戻る" outcome="index" /></p>

</div>
</h:body>
</html>
